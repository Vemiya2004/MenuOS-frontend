<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Payment...</title>
</head>
<body>
<script>
(async function () {
    const params = new URLSearchParams(window.location.search);

    const statusCode = params.get("status_code");
    const table = params.get("table") || "";
    const token = params.get("token") || "";

    setTimeout(() => {
        if (sessionStorage.getItem("payment_failed_return") === "1") {
            window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
        }
    }, 1200);    

    console.log("📥 Payment result params:", Object.fromEntries(params.entries()));

    // ✅ Only approved payment should create order
    if (!statusCode || statusCode !== "2") {
        sessionStorage.removeItem("pending_paid_order");
        sessionStorage.setItem("payment_failed_return", "1");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
        return;
    }

    const rawOrder = sessionStorage.getItem("pending_paid_order");

    if (!rawOrder) {
        alert("Payment was completed, but order data is missing.");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
        return;
    }

    try {
        const orderData = JSON.parse(rawOrder);

        const res = await fetch("https://menuos-backend.onrender.com/api/order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(orderData)
        });

        const result = await res.json();
        console.log("📥 Final paid order result:", result);

        if (res.ok && result.success) {
            localStorage.removeItem("cart");
            sessionStorage.removeItem("pending_paid_order");

            if (result.redirect_url) {
                window.location.replace(result.redirect_url);
            } else {
                window.location.replace(`success.html?orderId=${encodeURIComponent(result.order_id)}&table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
            }
        } else {
            throw new Error(result.error || "Failed to save paid order");
        }

    } catch (err) {
        console.error("❌ Error saving approved order:", err);
        alert("Payment completed, but order saving failed.");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
    }
})();
</script>
</body>
</html>
