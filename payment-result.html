<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Payment...</title>
</head>
<body>
<script>
(async function () {
    const params = new URLSearchParams(window.location.search);

    const tempOrderId = params.get("temp_order_id") || "";
    const table = params.get("table") || "";
    const token = params.get("token") || "";

    console.log("📥 Payment result params:", Object.fromEntries(params.entries()));

    if (!tempOrderId) {
        alert("Missing temporary order id.");
        window.location.href = `checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}&v=${Date.now()}`;
        return;
    }

    try {
        const statusRes = await fetch(`https://menuos-backend.onrender.com/api/payhere/status/${encodeURIComponent(tempOrderId)}`);
        const statusData = await statusRes.json();

        console.log("✅ PayHere backend status:", statusData.status);

        if (!statusRes.ok) {
            throw new Error(statusData.error || "Failed to check payment status");
        }

        if (statusData.status !== "paid") {
            sessionStorage.removeItem("pending_paid_order");
            sessionStorage.setItem("payment_failed_return", "1");
            window.location.href = `checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}&v=${Date.now()}`;
            return;
        }

        const rawOrder = sessionStorage.getItem("pending_paid_order");

        if (!rawOrder) {
            alert("Payment was completed, but order data is missing.");
            window.location.href = `checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}&v=${Date.now()}`;
            return;
        }

        const orderData = JSON.parse(rawOrder);
        orderData.payment_status = 'paid';
        orderData.payment_method ='PayHere';
        orderData.payment_details = { gateway:'PayHere', type: 'Cards' };

        const res = await fetch("https://menuos-backend.onrender.com/api/order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(orderData)
        });

        const result = await res.json();
        console.log("📥 Final paid order result:", result);

        if (res.ok && result.success) {
            localStorage.removeItem(`cart_table_${table}`);
            sessionStorage.removeItem("pending_paid_order");

            if (result.redirect_url) {
                window.location.href = result.redirect_url;
            } else {
                window.location.href = `success.html?orderId=${encodeURIComponent(result.order_id)}&table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`;
            }
        } else {
            throw new Error(result.error || "Failed to save paid order");
        }

    } catch (err) {
        console.error("❌ Error saving approved order:", err);
        alert("Payment completed, but order saving failed.");
        window.location.href = `checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}&v=${Date.now()}`;
    }
})();
</script>
</body>
</html>
