<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Payment...</title>
</head>
<body>
<script>
console.log("New payment-result.html loaded"); 
(async function () {
    const params = new URLSearchParams(window.location.search);

    const tempOrderId = params.get("temp_order_id") || "";
    const table = params.get("table") || "";
    const token = params.get("token") || "";

    console.log("📥 Payment result params:", Object.fromEntries(params.entries()));

    if (!tempOrderId) {
        sessionStorage.setItem("payment_failed_return", "1");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
        return;
    }

    const rawOrder = sessionStorage.getItem("pending_paid_order");

    if (!rawOrder) {
        alert("Payment session expired. Please try again.");
        sessionStorage.setItem("payment_failed_return", "1");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
        return;
    }

    async function checkStatus() {
        const res = await fetch(`https://menuos-backend.onrender.com/api/payhere/status/${encodeURIComponent(tempOrderId)}`);
        const data = await res.json();
        return data.status;
    }

    let attempts = 0;
    let status = "pending";

    while (attempts < 10) {
        status = await checkStatus();
        console.log("📡 PayHere backend status:", status);

        if (status === "paid" || status === "failed") break;

        await new Promise(resolve => setTimeout(resolve, 1000));
        attempts++;
    }

    if (status !== "paid") {
        sessionStorage.removeItem("pending_paid_order");
        sessionStorage.setItem("payment_failed_return", "1");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
        return;
    }

    try {
        const orderData = JSON.parse(rawOrder);

        const res = await fetch("https://menuos-backend.onrender.com/api/order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(orderData)
        });

        const result = await res.json();
        console.log("📥 Final paid order result:", result);

        if (res.ok && result.success) {
            localStorage.removeItem("cart");
            sessionStorage.removeItem("pending_paid_order");

            if (result.redirect_url) {
                window.location.replace(result.redirect_url);
            } else {
                window.location.replace(`success.html?orderId=${encodeURIComponent(result.order_id)}&table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
            }
        } else {
            throw new Error(result.error || "Failed to save paid order");
        }

    } catch (err) {
        console.error("❌ Error saving approved order:", err);
        alert("Payment completed, but order saving failed.");
        sessionStorage.setItem("payment_failed_return", "1");
        window.location.replace(`checkout.html?table=${encodeURIComponent(table)}&token=${encodeURIComponent(token)}`);
    }
})();
</script>
</body>
</html>
