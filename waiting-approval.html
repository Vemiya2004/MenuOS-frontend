<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for Waiter Approval</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon1/restaurant_logo-favicon.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: rgba(0, 0, 0, 0.85);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff7ed;
            color: #f97316;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 18px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px;
            color: #111827;
        }
        p {
            color: #6b7280;
            line-height: 1.5;
            margin: 0 0 16px;
        }
        .ticket {
            font-weight: 700;
            color: #111827;
            background: #f3f4f6;
            padding: 10px 14px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 8px;
        }
        .spinner {
            margin: 20px auto 0;
            width: 32px;
            height: 32px;
            border: 4px solid #e5e7eb;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <span>
                <svg width="40px" height="40px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M21 11V16C21 18.8284 21 20.2426 20.1213 21.1213C19.2426 22 17.8284 22 15 22H9C6.17157 22 4.75736 22 3.87868 21.1213C3 20.2426 3 18.8284 3 16V11C3 11.9319 3 12.3978 3.15224 12.7654C3.35523 13.2554 3.74458 13.6448 4.23463 13.8478C4.60218 14 5.06812 14 6 14H6.67544C7.25646 14 7.54696 14 7.77888 14.1338C7.83745 14.1675 7.89245 14.2072 7.94303 14.2521C8.14326 14.4298 8.23513 14.7054 8.41886 15.2566L8.54415 15.6325C8.76416 16.2925 8.87416 16.6225 9.13605 16.8112C9.39794 17 9.7458 17 10.4415 17H13.5585C14.2542 17 14.6021 17 14.864 16.8112C15.1258 16.6225 15.2358 16.2925 15.4558 15.6325L15.5811 15.2566L15.5811 15.2566L15.5811 15.2566C15.7649 14.7054 15.8567 14.4298 16.057 14.2521C16.1075 14.2072 16.1625 14.1675 16.2211 14.1338C16.453 14 16.7435 14 17.3246 14H18C18.9319 14 19.3978 14 19.7654 13.8478C20.2554 13.6448 20.6448 13.2554 20.8478 12.7654C21 12.3978 21 11.9319 21 11Z" fill="#222222"/>
                    <path d="M16 6H17C18.8856 6 19.8284 6 20.4142 6.58579C21 7.17157 21 8.11438 21 10V18C21 19.8856 21 20.8284 20.4142 21.4142C19.8284 22 18.8856 22 17 22H7C5.11438 22 4.17157 22 3.58579 21.4142C3 20.8284 3 19.8856 3 18V10C3 8.11438 3 7.17157 3.58579 6.58579C4.17157 6 5.11438 6 7 6H8" stroke="#222222" stroke-width="2"/>
                    <path d="M8 10L12 13M12 13L16 10M12 13L12 3" stroke="#222222" stroke-width="2"/>
            </span>
        </div>
        
        <h1>Please wait</h1>
        <p>Please wait a moment.Wait for the waiter to approve......</p>
        <div id="ticketCodeBox" class="ticket">Loading...</div>
        <div class="spinner"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://menuos-backend.onrender.com';
        const params = new URLSearchParams(window.location.search);
        const ticketCode = params.get('ticket_code');
        const orderId = params.get('order_id');

        document.getElementById('ticketCodeBox').textContent = ticketCode || 'No ticket';

        async function checkApproval() {
            if (!ticketCode) return;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/api/waiter-tickets?status=all`);
                const tickets = await res.json();

                if (!Array.isArray(tickets)) return;

                const ticket = tickets.find(t => t.ticket_code === ticketCode);
                if (!ticket) return;

                if (ticket.waiter_status === 'approved') {
                    window.location.href = `success.html?orderId=${encodeURIComponent(orderId || '')}`;
                }
            } catch (e) {
                console.error('Approval check failed:', e);
            }
        }

        checkApproval();
        setInterval(checkApproval, 3000);
    </script>
</body>
</html>
